<a class="logo" href="{{ branding.logo_click_url or 'https://meridiannip.com' }}" target="{{ branding.logo_click_target or '_blank' }}" rel="noopener">
  {% if branding.logo_path %}
  <div class="logo-mark" style="display:flex;align-items:center;justify-content:center;">
    <img src="/api/v1/branding/assets/logo?v={{ (branding.updated_at|string)[:10] }}" alt="{{ branding.display_name|default('Logo') }}" style="max-height:44px;max-width:44px;">
  </div>
  {% else %}
  <div class="logo-mark">
    <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-linecap="round">
      <defs>
        <radialGradient id="lm-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="currentColor" stop-opacity=".28"/>
          <stop offset="60%" stop-color="currentColor" stop-opacity=".05"/>
          <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="24" cy="24" r="22" fill="url(#lm-glow)" stroke="none"/>
      <circle class="star" cx="4" cy="13" r=".8" fill="currentColor" stroke="none"/>
      <circle class="star" cx="44" cy="9" r=".7" fill="currentColor" stroke="none"/>
      <circle class="star" cx="45" cy="32" r=".8" fill="currentColor" stroke="none"/>
      <circle class="star" cx="6" cy="40" r=".7" fill="currentColor" stroke="none"/>
      <circle class="star" cx="2" cy="27" r=".6" fill="currentColor" stroke="none"/>
      <circle cx="24" cy="24" r="19" stroke-width="1" opacity=".4"/>
      <ellipse cx="24" cy="24" rx="19" ry="5.5" stroke-width=".9" opacity=".3"/>
      <ellipse cx="24" cy="24" rx="17" ry="2.5" stroke-width=".6" opacity=".18"/>
      <g class="m2"><ellipse cx="24" cy="24" rx="11" ry="19" stroke-width=".9" opacity=".5"/></g>
      <g class="m1"><ellipse cx="24" cy="24" rx="6" ry="19" stroke-width="1.6"/></g>
      <g class="m3"><ellipse cx="24" cy="24" rx="3" ry="19" stroke-width=".7" opacity=".55"/></g>
      <g class="mt"><circle cx="24" cy="5" r="1.4" fill="currentColor" stroke="none"/></g>
      <line x1="24" y1="5" x2="24" y2="43" stroke-width="1.3"/>
      <circle cx="24" cy="5"  r="2" fill="currentColor" stroke="none"/>
      <circle cx="24" cy="43" r="2" fill="currentColor" stroke="none"/>
      <g class="mp">
        <circle cx="24" cy="24" r="4.5" stroke-width=".7" opacity=".5"/>
        <circle cx="24" cy="24" r="2.5" fill="currentColor" stroke="none"/>
      </g>
    </svg>
  </div>
  {% endif %}
  <div>
    <div class="logo-text">{{ branding.display_name|default('MERIDIAN')|upper }}</div>
    <div class="logo-sub">NETWORK INTELLIGENCE PLATFORM</div>
  </div>
</a>
