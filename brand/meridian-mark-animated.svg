<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" stroke="#20c896" stroke-linecap="round">
  <title>Meridian mark — animated</title>
  <defs>
    <radialGradient id="lm-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#20c896" stop-opacity=".28"/>
      <stop offset="60%" stop-color="#20c896" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#20c896" stop-opacity="0"/>
    </radialGradient>
    <style><![CDATA[
      .m1{animation:mspin 16s linear infinite;transform-origin:24px 24px;transform-box:fill-box;}
      .m2{animation:mspin 24s linear infinite reverse;transform-origin:24px 24px;transform-box:fill-box;}
      .m3{animation:mspin 10s linear infinite;transform-origin:24px 24px;transform-box:fill-box;}
      .mt{animation:mspin 7s linear infinite;transform-origin:24px 24px;transform-box:fill-box;}
      .mp{animation:mpulse 2.6s ease-in-out infinite;transform-origin:24px 24px;transform-box:fill-box;}
      .star{animation:mtwinkle 3.2s ease-in-out infinite;}
      .star:nth-of-type(2){animation-delay:.6s;}
      .star:nth-of-type(3){animation-delay:1.1s;}
      .star:nth-of-type(4){animation-delay:1.7s;}
      .star:nth-of-type(5){animation-delay:2.3s;}
      @keyframes mspin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
      @keyframes mpulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.75;transform:scale(1.18);}}
      @keyframes mtwinkle{0%,100%{opacity:.15;}50%{opacity:.7;}}
    ]]></style>
  </defs>
  <circle cx="24" cy="24" r="22" fill="url(#lm-glow)" stroke="none"/>
  <circle class="star" cx="4" cy="13" r=".8" fill="#20c896" stroke="none"/>
  <circle class="star" cx="44" cy="9" r=".7" fill="#20c896" stroke="none"/>
  <circle class="star" cx="45" cy="32" r=".8" fill="#20c896" stroke="none"/>
  <circle class="star" cx="6" cy="40" r=".7" fill="#20c896" stroke="none"/>
  <circle class="star" cx="2" cy="27" r=".6" fill="#20c896" stroke="none"/>
  <circle cx="24" cy="24" r="19" stroke-width="1" opacity=".4"/>
  <ellipse cx="24" cy="24" rx="19" ry="5.5" stroke-width=".9" opacity=".3"/>
  <ellipse cx="24" cy="24" rx="17" ry="2.5" stroke-width=".6" opacity=".18"/>
  <g class="m2"><ellipse cx="24" cy="24" rx="11" ry="19" stroke-width=".9" opacity=".5"/></g>
  <g class="m1"><ellipse cx="24" cy="24" rx="6" ry="19" stroke-width="1.6"/></g>
  <g class="m3"><ellipse cx="24" cy="24" rx="3" ry="19" stroke-width=".7" opacity=".55"/></g>
  <g class="mt"><circle cx="24" cy="5" r="1.4" fill="#20c896" stroke="none"/></g>
  <line x1="24" y1="5" x2="24" y2="43" stroke-width="1.3"/>
  <circle cx="24" cy="5" r="2" fill="#20c896" stroke="none"/>
  <circle cx="24" cy="43" r="2" fill="#20c896" stroke="none"/>
  <g class="mp">
    <circle cx="24" cy="24" r="4.5" stroke-width=".7" opacity=".5"/>
    <circle cx="24" cy="24" r="2.5" fill="#20c896" stroke="none"/>
  </g>
</svg>
