name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint · Python + SQL + shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Ruff check
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/

      - name: Syntax parse every .py
        run: |
          python3 -c '
          import ast, os, sys
          errs = 0
          for r, _, files in os.walk("app"):
            for f in files:
              if f.endswith(".py"):
                p = os.path.join(r, f)
                try:
                  ast.parse(open(p).read(), p)
                except SyntaxError as e:
                  errs += 1
                  print(f"{p}:{e.lineno}: {e.msg}")
          sys.exit(errs)
          '

      - name: Shellcheck scripts/
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          # Block on real errors only. The "warning" tier surfaces SC2034
          # (envsubst template vars look unused), SC2024 (sudo+redirect to a
          # world-writable /tmp path), and an unused color constant — all
          # known false-positives or stylistic. A cleanup pass for those
          # can come later.
          severity: error

      - name: Verify schema.sql parses
        run: |
          # Psql isn't available here, but sqlparse can catch gross syntax bugs.
          pip install sqlparse
          python3 -c '
          import sqlparse, sys
          stmts = sqlparse.parse(open("db/schema.sql").read())
          print(f"schema.sql parsed into {len(stmts)} statements")
          '

  schema-vs-handlers:
    name: Every seeded celery handler has a registered task
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python3 - <<'PY'
          import re, os, sys
          schema = open('db/schema.sql').read()
          handlers = sorted(set(re.findall(r'meridian\.jobs\.[a-z]+:[a-z_]+', schema)))
          task_names = set()
          for r, _, files in os.walk('app'):
            for f in files:
              if f.endswith('.py'):
                src = open(os.path.join(r, f)).read()
                task_names.update(re.findall(r'@celery_app\.task\(name="([^"]+)"\)', src))
          missing = [h for h in handlers
                     if f'{h.split(":")[0]}.{h.split(":")[1]}' not in task_names]
          if missing:
            print('Handlers seeded in schema.sql with no matching @celery_app.task:')
            for m in missing: print(f'  {m}')
            sys.exit(1)
          print(f'all {len(handlers)} handlers are registered')
          PY

  pytest:
    name: Unit + smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: System packages for python-ldap / pyshark
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libldap2-dev libsasl2-dev libssl-dev tshark

      - name: Install Meridian + dev deps
        run: |
          pip install --upgrade pip wheel
          pip install -r requirements.txt -r requirements-dev.txt

      - name: pytest
        run: pytest --strict-markers -ra

  admin-nav-consistency:
    name: All admin sub-pages carry the full tab bar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          # The canonical admin tab list lives in app/templates/_admin_tabs.html
          # and is pulled into every admin_*.html via `{% include "_admin_tabs.html" %}`.
          # The old version of this test scanned each page for hardcoded
          # /ui/admin/* URLs, which don't appear in the page source (they're
          # inside the included partial) — false-failing every admin page.
          #
          # New shape: confirm (a) the partial exists, (b) it lists at least
          # the tabs we expect, and (c) every admin_*.html includes it,
          # except admin_settings.html which is explicitly tabless by design.
          import os, re, sys
          partial = 'app/templates/_admin_tabs.html'
          if not os.path.exists(partial):
              print(f'missing {partial}')
              sys.exit(1)
          tabs = re.findall(r"\('(/ui/admin[^']*)'", open(partial).read())
          if len(tabs) < 5:
              print(f'tab list looks suspiciously short ({len(tabs)} tabs): {tabs}')
              sys.exit(1)
          print(f'partial declares {len(tabs)} tabs:')
          for t in tabs: print(f'  {t}')

          EXEMPT = {'admin_settings.html'}  # intentionally has no tab bar
          admin_pages = sorted(f for f in os.listdir('app/templates')
                               if f.startswith('admin') and f.endswith('.html'))
          missing = []
          for f in admin_pages:
              if f in EXEMPT:
                  continue
              text = open(f'app/templates/{f}').read()
              if '_admin_tabs.html' not in text:
                  missing.append(f)
          if missing:
              print()
              print('admin pages NOT including _admin_tabs.html:')
              for m in missing: print(f'  {m}')
              sys.exit(1)
          print()
          print(f'all {len(admin_pages) - len(EXEMPT)} non-exempt admin pages include the tab bar')
          PY
