### Meridian unattended Debian-13 netinst preseed
###
### Used by scripts/repack-preseed-iso.sh to build a fully hands-off
### installer ISO. Boots straight into the install, lands in ~10 min
### with: SSH server running, "admin" deploy user (password `meridiannip`),
### and the meridian rsync target ready. No keyboard interaction required.
###
### Throwaway passwords below — the SSH key in `late_command` is the
### canonical access path. The throwaway password is in plain text on
### purpose so the operator can recover via the Hyper-V console if SSH
### is ever broken. Rotate / disable after install.sh has completed and
### the real admin account is set up.

### ---------------- locale / keyboard ----------------
d-i debian-installer/locale          string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

### ---------------- network ----------------
# DHCP at install time. install.sh later writes the systemd-networkd
# profile that pins the static IP (per the answers file fed to it).
d-i netcfg/choose_interface          select auto
d-i netcfg/hostname                  string meridiannip
d-i netcfg/get_hostname              string meridiannip
d-i netcfg/get_domain                string meridian.local
d-i netcfg/wireless_wep              string

### ---------------- mirror ----------------
d-i mirror/country                   string manual
d-i mirror/http/hostname             string deb.debian.org
d-i mirror/http/directory            string /debian
d-i mirror/http/proxy                string

### ---------------- clock / timezone ----------------
d-i clock-setup/utc                  boolean true
d-i time/zone                        string UTC
d-i clock-setup/ntp                  boolean true

### ---------------- users + passwords ----------------
# Appliance defaults per project_meridian_default_account.md memory:
# OS interactive account is `admin` with password `meridiannip`. The
# end user changes it from /ui/admin/users on first login. Root login
# is enabled with the same password as a recovery path through the
# Hyper-V / hypervisor console — disable via `passwd -l root` once
# SSH access is confirmed.
#
# `admin` is on Debian's reserved-username list inside the d-i
# user-setup-udeb, so we CAN'T create it via `d-i passwd/username`.
# Strategy: skip d-i's user-setup entirely with `passwd/make-user`
# boolean false; create the `admin` account in late_command using
# raw `useradd` (which does NOT enforce the reserved-name check).
d-i passwd/root-login                boolean true
d-i passwd/root-password             password meridiannip
d-i passwd/root-password-again       password meridiannip

d-i passwd/make-user                 boolean false
d-i user-setup/allow-password-weak   boolean true
d-i user-setup/encrypt-home          boolean false

### ---------------- partitioning ----------------
# Guided, single partition on the whole disk. No LVM. install.sh's
# LUKS_ENCRYPT=n in answers.local.env matches this.
d-i partman-auto/method              string regular
d-i partman-auto/choose_recipe       select atomic
d-i partman-auto/disk                string /dev/sda
d-i partman/default_filesystem       string ext4
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition         select finish
d-i partman/confirm                  boolean true
d-i partman/confirm_nooverwrite      boolean true

### ---------------- base + tasks ----------------
# Keep recommends ON. Earlier draft set this to false to shave disk;
# in practice that excludes ifupdown / isc-dhcp-client / similar
# network-config packages and the installed system comes up with no
# DHCP client and no /etc/network/interfaces template — i.e. it boots
# but is unreachable. install.sh trims later via apt clean / journal
# vacuum; size impact at this stage is acceptable.
d-i base-installer/install-recommends boolean true
tasksel tasksel/first                multiselect standard, ssh-server
# Belt + braces: explicitly pull the packages that absolutely must be
# present for the post-install system to be reachable on first boot.
d-i pkgsel/include                   string openssh-server isc-dhcp-client ifupdown systemd-resolved sudo ca-certificates rsync
popularity-contest popularity-contest/participate boolean false

### ---------------- bootloader ----------------
d-i grub-installer/only_debian       boolean true
d-i grub-installer/with_other_os     boolean false
d-i grub-installer/bootdev           string /dev/sda

### ---------------- apt sources ----------------
d-i apt-setup/non-free-firmware      boolean true
d-i apt-setup/non-free               boolean false
d-i apt-setup/contrib                boolean false
d-i apt-setup/services-select        multiselect security, updates

### ---------------- finish ----------------
d-i finish-install/reboot_in_progress note

### ---------------- late_command ----------------
# Runs at the very end of the install. Creates the admin user
# (because admin is on Debian's reserved-username list and can't go
# through d-i's user-setup), sets the throwaway password, configures
# sudo NOPASSWD, and ensures sshd is up on first boot.
#
# NOTE: this preseed does NOT bake in any SSH public key. The
# `@@AUTHORIZED_KEY@@` token below is rewritten by
# scripts/repack-preseed-iso.sh at ISO-build time using either:
#   - $MERIDIAN_AUTHORIZED_KEY env var if set, or
#   - the contents of the file at $MERIDIAN_AUTHORIZED_KEY_FILE, or
#   - nothing (the token becomes empty; admin user logs in with
#     the throwaway password `meridiannip` and adds their own key
#     before they do anything else).
#
# This avoids the supply-chain pitfall of shipping someone else's key
# baked into the appliance — the only way an SSH key lands in
# /root/.ssh/authorized_keys is if the operator building the ISO
# explicitly authorized it.
d-i preseed/late_command             string \
    in-target useradd -m -s /bin/bash -c 'Meridian admin' -G sudo,audio,cdrom,dialout,floppy,video,plugdev,netdev admin ; \
    in-target sh -c 'echo "admin:meridiannip" | chpasswd' ; \
    mkdir -p /target/root/.ssh /target/home/admin/.ssh ; \
    sh -c '[ -n "@@AUTHORIZED_KEY@@" ] && echo "@@AUTHORIZED_KEY@@" > /target/root/.ssh/authorized_keys || touch /target/root/.ssh/authorized_keys' ; \
    sh -c '[ -n "@@AUTHORIZED_KEY@@" ] && echo "@@AUTHORIZED_KEY@@" > /target/home/admin/.ssh/authorized_keys || touch /target/home/admin/.ssh/authorized_keys' ; \
    chmod 0700 /target/root/.ssh /target/home/admin/.ssh ; \
    chmod 0600 /target/root/.ssh/authorized_keys /target/home/admin/.ssh/authorized_keys ; \
    in-target chown -R admin:admin /home/admin/.ssh ; \
    mkdir -p /target/etc/sudoers.d ; \
    echo 'admin ALL=(ALL) NOPASSWD:ALL' > /target/etc/sudoers.d/90-meridian-admin ; \
    chmod 0440 /target/etc/sudoers.d/90-meridian-admin ; \
    in-target systemctl enable ssh.service ; \
    mkdir -p /target/etc/systemd/network ; \
    printf '[Match]\nName=en* eth*\n\n[Network]\nDHCP=yes\nIPv6AcceptRA=yes\n' > /target/etc/systemd/network/00-meridian-dhcp.network ; \
    chmod 0644 /target/etc/systemd/network/00-meridian-dhcp.network ; \
    in-target systemctl enable systemd-networkd.service ; \
    in-target systemctl enable systemd-resolved.service ; \
    in-target ln -sf /run/systemd/resolve/stub-resolv.conf /etc/resolv.conf
