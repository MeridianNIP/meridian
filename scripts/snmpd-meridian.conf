# Meridian NIP — net-snmp agent config.
#
# Installed to /etc/snmp/snmpd.conf.d/meridian.conf (Debian) or appended
# to /etc/snmp/snmpd.conf by install.sh. Community strings are seeded
# from the Meridian DB via a small regeneration script that rewrites
# this file whenever an admin adds/edits/deletes a community through
# the portal.
#
# OID tree served: 1.3.6.1.4.1.60022 (MERIDIAN-NIP-MIB).
# ----------------------------------------------------------------------

# Debian's default /etc/snmp/snmpd.conf already binds UDP 161 on
# 127.0.0.1. If you need it on a real interface, override there
# (or with an agentaddress line BEFORE the default snmpd.conf loads).

# Community strings + access — rewritten by install.sh / admin action.
# Format: rocommunity <string> default -V meridian
#         rwcommunity <string> default -V meridian
# Example (regenerated, do not hand-edit):
#     rocommunity "s3cret-ro" default -V meridian
#     rwcommunity "s3cret-rw" default -V meridian

# View: expose ONLY the Meridian enterprise arc — no system OIDs, no
# UCD-SNMP stats. Operators see exactly what the MIB defines and nothing
# else, even if they craft a snmpwalk against the root OID.
view meridian included .1.3.6.1.4.1.60022

# pass_persist: hook the Python agent for the Meridian OID tree.
# snmpd starts the script once at agent load; it stays running and
# answers get/getnext requests on stdin/stdout.
pass_persist .1.3.6.1.4.1.60022 /usr/bin/python3 /opt/meridian/scripts/meridian-snmp-agent.py

# System info (sysName, sysContact, sysLocation) is intentionally left
# default — external monitoring tools may still probe these at 1.3.6.1.
# Meridian's MIB is cleanly separated so there's no overlap.

# Logging is handled by the default /etc/snmp/snmpd.conf (syslog).