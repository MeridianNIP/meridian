# Meridian · fail2ban filter for failed login attempts.
# Installed to /etc/fail2ban/filter.d/meridian-login.conf.
#
# The access log includes a tag like:  auth.login.failed src=<IP> user=<name>
# emitted by app/auth/routes.py when a password verification fails.

[Definition]
failregex = auth\.login\.failed\b.*\bsrc=<HOST>\b
ignoreregex =
