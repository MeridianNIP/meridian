# Meridian · fail2ban jail overlay
# Installed to /etc/fail2ban/jail.d/meridian.conf by install.sh.
# Variables:
#   ${SSH_PORT}

[DEFAULT]
# Sensible project-wide defaults. jail.local still wins over these.
bantime.increment = true
bantime.factor    = 2
bantime.maxtime   = 7d

[sshd]
enabled   = true
port      = ${SSH_PORT}
filter    = sshd
logpath   = %(sshd_log)s
backend   = %(sshd_backend)s
maxretry  = 4
findtime  = 10m
bantime   = 1h

[nginx-bad-request]
enabled  = true
filter   = nginx-bad-request
logpath  = /var/log/nginx/meridian-error.log
maxretry = 8
findtime = 5m
bantime  = 30m

[nginx-req-limit]
enabled  = true
filter   = nginx-limit-req
logpath  = /var/log/nginx/meridian-error.log
maxretry = 10
findtime = 5m
bantime  = 1h

# Custom: Meridian login failures. Triggered by audit events written to the
# app-access log (see filter.d/meridian-login.conf). Slow-banlist that grows
# more aggressive than ssh because a brute-forcer has 5 attempts/min via Nginx.
[meridian-login]
enabled  = true
filter   = meridian-login
logpath  = /var/log/meridian/app-access.log
maxretry = 8
findtime = 10m
bantime  = 2h
